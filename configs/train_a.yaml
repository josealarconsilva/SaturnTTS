# Phase A: Base fine-tuning (no style conditioning)
# Adapts pretrained F5-TTS to Expresso speakers/recording conditions

training:
  phase: A
  max_steps: 20000
  warmup_steps: 2000
  learning_rate: 1.0e-5
  weight_decay: 0.01
  grad_clip: 1.0
  grad_accumulation_steps: 4
  max_frames_per_batch: 12000
  mixed_precision: bf16

  # EMA
  ema_decay: 0.9999

  # Logging
  log_every: 100
  save_every: 5000
  sample_every: 5000

  # Checkpointing
  keep_last_n_checkpoints: 5

data:
  train_metadata: /home/jose/SaturnTTS/data/metadata_train.json
  val_metadata: /home/jose/SaturnTTS/data/metadata_val.json
  styles_path: /home/jose/SaturnTTS/data/styles.json
  data_root: /home/jose/SaturnTTS/data

pretrained:
  checkpoint: /home/jose/SaturnTTS/pretrained/F5TTS_v1_Base/model_1250000.safetensors
